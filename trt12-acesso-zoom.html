<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Seleção de Audiências</title>
    <style>
        select {
            margin-top: 5px;
            padding: 5px;
            min-width: 320px;
        }

        body {
            font-family: Arial, sans-serif;
            background-size: cover;
            padding: 40px;
            margin: 0;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.97);
            max-width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .modal-content h3 {
            margin-top: 0;
            color: #333;
        }

        .link-container {
            margin: 20px 0;
            background: #f8f9fa;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
            text-align: left;
            max-height: 100px;
            overflow-y: auto;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .btn-download {
            background-color: #28a745;
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 12px;
            color: white;
            border-radius: 6px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .btn-retry {
            background-color: #007bff;
        }

        .btn-cancel {
            background-color: #6c757d;
        }

        .modal-buttons button {
            margin-top: 0;
        }

        .download-info {
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.4;
            color: #555;
        }

        .device-specific {
            display: none;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <h2>Entrar na Audiência ZOOM</h2>

        <form method="post" id="formZoom">
            <label for="nome">Nome completo:</label>
            <input type="text" name="nome" id="nome" required>

            <label for="papel">Você é:</label>
            <select name="papel" id="papel" required>
                <option value="">Selecione</option>
                <option value="Autor">Autor</option>
                <option value="Reu">Réu</option>
                <option value="AdvogadoAutor">Advogado do Autor</option>
                <option value="AdvogadoReu">Advogado do Réu</option>
                <option value="Testemunha">Testemunha</option>
            </select>

            <div id="campoDocumento" class="hidden">
                <label for="documento">Número do CPF:</label>
                <input type="text" name="documento" id="documento" placeholder="Ex: 123.456.789-00">
            </div>

            <div id="campoOAB" class="hidden">
                <label for="oab">Número da OAB - UF:</label>
                <input type="text" name="oab" id="oab" placeholder="Ex: 123456 SP">
            </div>

            <label for="unidadeSelect">Selecione a Unidade:</label>
            <select id="unidadeSelect">
                <option value="">-- Escolha uma unidade --</option>
            </select>

            <div id="audienciaDiv" style="display:none;">
                <label for="audienciaSelect">Selecione a Audiência:</label>
                <select id="audienciaSelect">
                    <option value="">-- Escolha uma audiência --</option>
                </select>
            </div>

            <button type="submit" id="btnSubmit" disabled>Entrar na Audiência</button>
        </form>
    </div>

    <!-- Modal de Download -->
    <div id="modalDownload" class="modal-overlay">
        <div class="modal-content">
            <h3>Aplicativo Zoom Necessário</h3>
            <div class="download-info">
                Não conseguimos abrir o Zoom automaticamente. <br>
                Certifique-se de que o <strong>Aplicativo Desktop do Zoom</strong> (ou o App mobile) está instalado em seu dispositivo.
            </div>
            
            <div class="modal-buttons">
                <!-- Desktop -->
                <a href="https://zoom.us/download" id="linkDesktop" class="btn-download device-specific" target="_blank">Baixar Zoom para Desktop</a>
                
                <!-- iOS -->
                <a href="https://apps.apple.com/us/app/zoom-one-platform-to-connect/id546505307" id="linkIOS" class="btn-download device-specific" target="_blank">Baixar na App Store</a>
                
                <!-- Android -->
                <a href="https://play.google.com/store/apps/details?id=us.zoom.videomeetings" id="linkAndroid" class="btn-download device-specific" target="_blank">Baixar no Google Play</a>

                <button type="button" id="btnRetry" class="btn-retry">Já instalei, entrar agora</button>
                <button type="button" id="btnCancelModal" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM Elements =====
        const formZoom = document.getElementById("formZoom");
        const unidadeSelect = document.getElementById("unidadeSelect");
        const audienciaSelect = document.getElementById("audienciaSelect");
        const audienciaDiv = document.getElementById("audienciaDiv");
        const btnSubmit = document.getElementById("btnSubmit");

        const nome = document.getElementById("nome");
        const papel = document.getElementById("papel");
        const documento = document.getElementById("documento");
        const oab = document.getElementById("oab");
        const campoDocumento = document.getElementById("campoDocumento");
        const campoOAB = document.getElementById("campoOAB");

        const modalDownload = document.getElementById("modalDownload");
        const btnRetry = document.getElementById("btnRetry");
        const btnCancelModal = document.getElementById("btnCancelModal");
        
        const linkDesktop = document.getElementById("linkDesktop");
        const linkIOS = document.getElementById("linkIOS");
        const linkAndroid = document.getElementById("linkAndroid");

        let currentZoomLink = "";
        let detectionTimeout = null;

        // ===== Dados (CSV com ;) =====
        const dados = `
Itajaí - 01a Vara;Sala de audiências;4732411211
Itajaí - 02a Vara;Sala de audiências;86234313077
Itajaí - 03a Vara;Sala de audiências;4732411230
Navegantes - 01a Vara;Audiências entre 8h e 8h29min;82827253075
Navegantes - 01a Vara;Audiência das 8h30min;4732411280
Navegantes - 01a Vara;Audiência das 9h00min;86126311393
Navegantes - 01a Vara;Audiência das 9h30min;89485341412
Navegantes - 01a Vara;Audiência das 10h00min;84062567431
Navegantes - 01a Vara;Audiência das 10h30min;81338106875
Navegantes - 01a Vara;Audiência das 11h00min;82355134488
CEJUSC - Itajaí e Navegantes;Sala de Audiências;4732411294
    `.trim();

        const linhas = dados.split("\n").map(l => {
            const [unidade, descricao, id] = l.split(";");
            return { unidade: unidade.trim(), descricao: descricao.trim(), id: (id || "").trim() };
        });

        const unidades = [...new Set(linhas.map(l => l.unidade))];

        // ===== Utils & Logic =====

        function montarUname() {
            const nomeTrim = nome.value.trim();
            const papelVal = papel.value;
            let uname = `${nomeTrim}-${papelVal}`;
            if (papelVal === "AdvogadoAutor" || papelVal === "AdvogadoReu") {
                uname += `-${oab.value.trim()}`;
            }
            if (papelVal === "Testemunha") {
                uname += `-${documento.value.trim()}`;
            }
            return uname;
        }

        function validar() {
            let valido = nome.value.trim() && papel.value;

            if (papel.value === "Testemunha") {
                valido = valido && documento.value.trim().length === 14; // CPF com máscara
            }
            if (papel.value === "AdvogadoAutor" || papel.value === "AdvogadoReu") {
                valido = valido && oab.value.trim().length >= 7;
            }

            const idReuniao = audienciaSelect.value;
            const idOk = idReuniao && idReuniao.length >= 9;

            valido = valido && idOk;

            btnSubmit.disabled = !valido;
        }

        function mostrarCampos() {
            campoDocumento.classList.add("hidden");
            campoOAB.classList.add("hidden");
            documento.required = false;
            oab.required = false;

            if (papel.value === "Testemunha") {
                campoDocumento.classList.remove("hidden");
                documento.required = true;
            }
            if (papel.value === "AdvogadoAutor" || papel.value === "AdvogadoReu") {
                campoOAB.classList.remove("hidden");
                oab.required = true;
            }
            validar();
        }

        function aplicarMascaras() {
            documento.addEventListener("input", function (e) {
                let v = e.target.value.replace(/\D/g, '').slice(0, 11);
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
                e.target.value = v;
                validar();
            });

            oab.addEventListener("input", function (e) {
                let val = e.target.value.replace(/[^\dA-Za-z]/g, '').toUpperCase().slice(0, 9);
                val = val.replace(/^(\d{1,6})([A-Z]{0,2})/, (match, num, uf) => {
                    return uf ? `${num} ${uf}` : num;
                });
                e.target.value = val;
                validar();
            });
        }

        // ===== Event Listeners =====

        function detectarDispositivo() {
            const ua = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const isAndroid = /Android/.test(ua);

            // Esconder todos primeiro
            linkDesktop.style.display = "none";
            linkIOS.style.display = "none";
            linkAndroid.style.display = "none";

            if (isIOS) {
                linkIOS.style.display = "block";
            } else if (isAndroid) {
                linkAndroid.style.display = "block";
            } else {
                linkDesktop.style.display = "block";
            }
        }

        function tentarEntrarNoZoom() {
            if (!currentZoomLink) return;

            let focusLost = false;
            
            // Função para detectar se a janela perdeu o foco (indicando que o Zoom abriu)
            const onBlur = () => {
                focusLost = true;
                clearTimeout(detectionTimeout);
                window.removeEventListener('blur', onBlur);
            };

            window.addEventListener('blur', onBlur);

            // Tentar abrir o protocolo do Zoom
            window.location.href = currentZoomLink;

            // Se após 2.5 segundos o foco não foi perdido, mostramos o modal de download
            detectionTimeout = setTimeout(() => {
                window.removeEventListener('blur', onBlur);
                if (!focusLost) {
                    detectarDispositivo();
                    modalDownload.style.display = "flex";
                }
            }, 2500);
        }

        // ===== Event Listeners =====

        formZoom.addEventListener("submit", function (e) {
            e.preventDefault();
            const idReuniao = audienciaSelect.value;
            if (!idReuniao) return;

            const nomeUname = montarUname();
            currentZoomLink = "zoommtg://zoom.us/join?confno=" + idReuniao + "&uname=" + encodeURIComponent(nomeUname);

            tentarEntrarNoZoom();
        });

        btnRetry.addEventListener("click", () => {
            modalDownload.style.display = "none";
            tentarEntrarNoZoom();
        });

        btnCancelModal.addEventListener("click", () => {
            modalDownload.style.display = "none";
            if (detectionTimeout) clearTimeout(detectionTimeout);
        });

        unidadeSelect.addEventListener("change", () => {
            const unidadeEscolhida = unidadeSelect.value;
            audienciaSelect.innerHTML = '<option value="">-- Escolha uma audiência --</option>';
            audienciaDiv.style.display = "none";

            if (!unidadeEscolhida) {
                validar();
                return;
            }

            const auds = linhas.filter(l => l.unidade === unidadeEscolhida);
            auds.forEach(a => {
                const opt = document.createElement("option");
                opt.value = a.id;
                opt.textContent = a.descricao;
                audienciaSelect.appendChild(opt);
            });

            audienciaDiv.style.display = "block";

            if (audienciaSelect.options.length === 2) {
                audienciaSelect.selectedIndex = 1;
                audienciaDiv.style.display = "none";
            } else {
                audienciaSelect.selectedIndex = 0;
            }

            validar();
        });

        audienciaSelect.addEventListener("change", validar);
        nome.addEventListener("input", validar);
        papel.addEventListener("change", mostrarCampos);
        documento.addEventListener("input", validar);
        oab.addEventListener("input", validar);

        // ===== Initialization =====

        // Popular unidades
        unidades.forEach(u => {
            const opt = document.createElement("option");
            opt.value = u;
            opt.textContent = u;
            unidadeSelect.appendChild(opt);
        });

        document.addEventListener("DOMContentLoaded", aplicarMascaras);

        // Estado inicial consistente
        validar();
    </script>
</body>

</html>
